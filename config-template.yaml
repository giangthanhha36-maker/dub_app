# Cau hinh dub_app — copy thanh config.yaml va chinh neu can

tts:
  model: "k2-fsa/OmniVoice"
  no_asr: false          # true = nhe VRAM, khoi dong nhanh hon
  num_step: 32
  max_speed: 1.3
  hard_sync: true
